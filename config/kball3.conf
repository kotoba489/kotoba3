CONFIG_ZMK_KEYBOARD_NAME="kball3"

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Bluetooth reconnection stability for PC/Mac hosts.
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_GATT_ENFORCE_SUBSCRIPTION=n
CONFIG_BT_GATT_CACHING=n
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# Keep Bluetooth bond/profile information across power cycles.
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_ZMK_POINTING=y

CONFIG_ZMK_STUDIO=n

# Avoid BLE wake/reconnect instability; use the power switch for long idle.
CONFIG_ZMK_SLEEP=n
