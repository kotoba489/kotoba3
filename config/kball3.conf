CONFIG_ZMK_KEYBOARD_NAME="kball3"

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_BLE=y
CONFIG_ZMK_USB=y

# Keep Bluetooth bond/profile information across power cycles.
CONFIG_SETTINGS=y
CONFIG_BT_SETTINGS=y
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

CONFIG_ZMK_BATTERY_REPORTING=y

CONFIG_ZMK_POINTING=y

CONFIG_ZMK_STUDIO=n

CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=7200000
