# =========================================================
# 1. トラックボール・ポインティング設定 (ZMK v0.3.0 対応)
# =========================================================
CONFIG_SPI=y
CONFIG_INPUT=y
CONFIG_ZMK_POINTING=y
CONFIG_PMW3610=y

# PMW3610 センサーの反転・軸入れ替え設定（必要な場合はコメント解除）
# CONFIG_PMW3610_SWAP_XY=y
# CONFIG_PMW3610_INVERT_X=y
# CONFIG_PMW3610_INVERT_Y=y

# =========================================================
# 2. Bluetooth 接続安定化・電波強度設定（macOS / Mobile 対応）
# =========================================================
# 電波強度の最大化 (+8dBm)
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# 実験的 BLE 接続改善（高速・安定な自動再接続）
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# macOS に最適化した BLE 接続インターバル設定
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400

# =========================================================
# 3. 電源管理（スリープ設定）
# =========================================================
# 深いスリープ（Deep Sleep）からの復帰時のBLE不整合を回避するため無効化
# （使用しない時は物理電源スイッチでOFFにする運用）
CONFIG_ZMK_SLEEP=n
